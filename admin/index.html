<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <script src="../assets/js/identity-invite-redirect.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Админка · Елена Бочарова</title>
</head>
<body>
  <!-- Decap CMS — панель для редактирования контента сайта.
       Настройка один раз: NETLIFY-SETUP.md (для разработчика).
       Инструкция для Елены: ELENA-ADMIN.md -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function (user) {
        var token = (location.search || '') + (location.hash || '');
        if (!user && /(invite_token|confirmation_token|recovery_token)=/i.test(token)) {
          window.netlifyIdentity.open('signup');
        }
      });
    }
  </script></body>
</html>
